schema: spec-driven

context: |
  Tech stack: Rust (channel 1.96.0) with Cargo. Node.js/pnpm for release tools (changesets, commitlint, husky).
  Architecture: Windows-native CLI wrapper around PyManager for Python version switching.
  Testing: cargo test (with assert_cmd/predicates for integration testing).
  Style: rustfmt (max_width 100), clippy (MSRV 1.96.0).
  VCS: git repository.

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: true
    test_command: "cargo test"
  verify:
    test_command: "cargo test"
    build_command: "cargo build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas