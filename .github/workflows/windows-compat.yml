name: Windows Compatibility

# Windows compatibility testing — runs fpm against real PyManager on
# multiple Windows versions. Separated from CI (fmt/clippy/unit tests)
# so the main CI stays fast for contributors.
#
# Install strategy (per https://docs.python.org/3/using/windows.html):
# - Server 2022: MSIX via Add-AppxPackage (appinstaller from python.org)
# - Server 2019: MSI via msiexec (MSIX not supported on Server 2019)
#
# Future contributors: copy this pattern for linux.yml or macos.yml
# when adding support for other platforms.

on:
  release:
    types: [published]
  push:
    tags: ['v*']
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

env:
  CARGO_TERM_COLOR: always

jobs:
  compatibility:
    name: Windows ${{ matrix.os-label }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Server 2022 — shares kernel base with Windows 11
          - os: windows-latest
            os-label: 'Server 2022'
            pymanager-method: msix
          # Server 2019 — shares kernel base with Windows 10 1809
          - os: windows-2019
            os-label: 'Server 2019'
            pymanager-method: msi

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.96.0

      - uses: Swatinem/rust-cache@v2

      - name: Remove legacy py launcher
        shell: pwsh
        run: |
          # The legacy py.exe at C:\Windows\py.exe does NOT support
          # `py list` or `py install`. It must be removed before installing
          # the new PyManager, otherwise it shadows the new one on PATH.
          # See: https://docs.python.org/3/using/windows.html#troubleshooting
          $legacyPy = "C:\Windows\py.exe"
          $legacyDll = "C:\Windows\pyshellext.dll"
          foreach ($f in @($legacyPy, $legacyDll)) {
            if (Test-Path $f) {
              Write-Host "Removing legacy launcher: $f"
              Remove-Item $f -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Install PyManager (MSIX — Server 2022)
        if: matrix.pymanager-method == 'msix'
        shell: pwsh
        run: |
          # Server 2022 supports MSIX. Install the PyManager app execution alias
          # via the AppInstaller file from python.org.
          # See: https://docs.python.org/3/using/windows.html#advanced-installation
          Write-Host "Installing PyManager via MSIX (appinstaller)..."
          Add-AppxPackage -AppInstallerFile "https://www.python.org/ftp/python/pymanager/pymanager.appinstaller"

          # Refresh PATH — the MSIX installs as app execution alias in WindowsApps
          $machinePath = [System.Environment]::GetEnvironmentVariable("PATH", "Machine")
          $userPath = [System.Environment]::GetEnvironmentVariable("PATH", "User")
          $env:PATH = "$machinePath;$userPath"

          # Ensure WindowsApps is on PATH (where the new py.exe alias lives)
          $windowsApps = "$env:LocalAppData\Microsoft\WindowsApps"
          if ($env:PATH -notlike "*$windowsApps*") {
            $env:PATH = "$windowsApps;$env:PATH"
          }
          echo "$windowsApps" >> $env:GITHUB_PATH

      - name: Install PyManager (MSI — Server 2019)
        if: matrix.pymanager-method == 'msi'
        shell: pwsh
        run: |
          # Server 2019 does NOT support MSIX. Use the MSI installer instead.
          # The MSI installs to Program Files and modifies system PATH.
          # See: https://docs.python.org/3/using/windows.html#advanced-installation
          $msiUrl = "https://www.python.org/ftp/python/pymanager/python-manager-26.3.msi"
          $msiPath = "$env:TEMP\pymanager.msi"
          Write-Host "Downloading PyManager MSI from $msiUrl"
          Invoke-WebRequest -Uri $msiUrl -OutFile $msiPath -UseBasicParsing

          Write-Host "Installing PyManager via MSI..."
          Start-Process msiexec.exe -ArgumentList "/i", $msiPath, "/quiet", "/norestart" -Wait

          # Refresh PATH
          $machinePath = [System.Environment]::GetEnvironmentVariable("PATH", "Machine")
          $userPath = [System.Environment]::GetEnvironmentVariable("PATH", "User")
          $env:PATH = "$machinePath;$userPath"

          # The MSI installs py.exe to Program Files — find and add to PATH
          $pyCandidates = @(
            "C:\Program Files\PyManager\py.exe",
            "C:\Program Files\Python Manager\py.exe"
          )
          foreach ($p in $pyCandidates) {
            if (Test-Path $p) {
              $dir = Split-Path $p
              Write-Host "Found py.exe at: $p"
              $env:PATH = "$dir;$env:PATH"
              echo "$dir" >> $env:GITHUB_PATH
              break
            }
          }

      - name: Verify PyManager and install Python runtimes
        shell: pwsh
        run: |
          # Verify the NEW PyManager is installed (not the legacy launcher)
          $pyCmd = Get-Command py -ErrorAction SilentlyContinue
          if ($pyCmd) {
            Write-Host "py.exe found at: $($pyCmd.Source)"
          } else {
            Write-Host "ERROR: py.exe not found on PATH after PyManager install"
            exit 1
          }

          # Verify py list works (this is the key test — legacy launcher fails here)
          py --version
          Write-Host "---"
          py list

          # Install Python 3.14 and 3.13 via the new PyManager
          py install 3.14
          py install 3.13
          py list

      - name: Build fpm
        run: cargo build --release

      - name: Add fpm to PATH
        shell: pwsh
        run: |
          $fpmDir = Join-Path $PWD "target\release"
          echo $fpmDir >> $env:GITHUB_PATH

      - name: Run unit tests
        run: cargo test

      - name: Run integration tests (including ignored)
        shell: pwsh
        run: |
          # Run all tests including #[ignore] ones that need real PyManager
          cargo test -- --ignored --nocapture

      - name: Smoke test — fpm list
        shell: pwsh
        run: fpm list

      - name: Smoke test — fpm current
        shell: pwsh
        run: fpm current

      - name: Smoke test — fpm env
        shell: pwsh
        run: fpm env --shell powershell

      - name: Smoke test — fpm use
        shell: pwsh
        run: |
          fpm env --shell powershell | Out-String | Invoke-Expression
          fpm use 3.13
          fpm current
          python --version

      - name: Smoke test — pass-through
        shell: pwsh
        run: fpm -0p

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os-label }}
          path: |
            target/release/fpm.exe
            Cargo.lock