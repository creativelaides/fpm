name: Windows Compatibility

# Windows compatibility testing — runs fpm against real PyManager on
# multiple Windows versions. Separated from CI (fmt/clippy/unit tests)
# so the main CI stays fast for contributors.
#
# This workflow installs PyManager + Python on each runner, builds fpm,
# and runs the #[ignore] integration tests that require a real `py.exe`.
#
# Future contributors: copy this pattern for linux.yml or macos.yml
# when adding support for other platforms.

on:
  # Run on releases and tags (not every PR — this is heavier)
  release:
    types: [published]
  push:
    tags: ['v*']
  # Manual trigger
  workflow_dispatch:
  # Nightly sanity check
  schedule:
    - cron: '0 6 * * *'

env:
  CARGO_TERM_COLOR: always

jobs:
  compatibility:
    name: Windows ${{ matrix.os-label }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Server 2022 — shares kernel base with Windows 11
          - os: windows-latest
            os-label: 'Server 2022'
          # Server 2019 — shares kernel base with Windows 10 1809
          - os: windows-2019
            os-label: 'Server 2019'

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.96.0

      - uses: Swatinem/rust-cache@v2

      - name: Install Python with py launcher from python.org
        shell: pwsh
        run: |
          # The new PyManager (py list, py install) is distributed as an MSIX
          # app execution alias via the Microsoft Store, which does NOT work
          # on Windows Server (GitHub Actions runners). The python.org installer
          # provides the legacy py.exe launcher that supports `py -V:tag` but
          # NOT `py list` or `py install`.
          #
          # We install Python from python.org and use the legacy launcher for
          # basic compatibility. Commands that require the new PyManager
          # (`py list --format=json`, `py install`) are expected to fail on
          # Server runners — they are tested locally on desktop Windows instead.
          $installerUrl = "https://www.python.org/ftp/python/3.14.6/python-3.14.6-amd64.exe"
          $installer = "$env:TEMP\python-installer.exe"
          Write-Host "Downloading Python 3.14.6 installer from $installerUrl"
          Invoke-WebRequest -Uri $installerUrl -OutFile $installer -UseBasicParsing

          Write-Host "Installing Python 3.14.6..."
          Start-Process -FilePath $installer -ArgumentList "/quiet", "InstallAllUsers=1", "PrependPath=1", "Include_launcher=1" -Wait

          # Refresh PATH
          $machinePath = [System.Environment]::GetEnvironmentVariable("PATH", "Machine")
          $userPath = [System.Environment]::GetEnvironmentVariable("PATH", "User")
          $env:PATH = "$machinePath;$userPath"

          # Verify py.exe is available (legacy launcher — supports py -V:tag)
          $pyCmd = Get-Command py -ErrorAction SilentlyContinue
          if ($pyCmd) {
            Write-Host "py.exe found at: $($pyCmd.Source)"
          } else {
            Write-Host "WARNING: py.exe not found on PATH"
            # Try common locations
            $candidates = @("C:\Windows\py.exe", "C:\Program Files\Python314\py.exe")
            foreach ($c in $candidates) {
              if (Test-Path $c) {
                Write-Host "Found py.exe at: $c"
                $env:PATH = "$(Split-Path $c);$env:PATH"
                break
              }
            }
          }

          py --version
          Write-Host "---"
          # Legacy launcher does NOT support `py list` — it supports `py -V:tag` only
          # Try py list anyway and document the result
          $result = py list 2>&1
          Write-Host "py list output: $result"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "NOTE: py list is not supported by the legacy launcher on Windows Server."
            Write-Host "This is expected — the new PyManager requires the Microsoft Store (MSIX)."
            Write-Host "fpm commands that depend on py list will be skipped in this environment."
            # Set an env var so subsequent steps know PyManager is limited
            echo "FPM_PYMANAGER_LIMITED=1" >> $env:GITHUB_ENV
          }

      - name: Install Python 3.13 for testing
        shell: pwsh
        run: |
          # Install Python 3.13 from python.org (can't use py install on legacy launcher)
          $installerUrl = "https://www.python.org/ftp/python/3.13.7/python-3.13.7-amd64.exe"
          $installer = "$env:TEMP\python-313-installer.exe"
          Write-Host "Downloading Python 3.13.7 installer from $installerUrl"
          Invoke-WebRequest -Uri $installerUrl -OutFile $installer -UseBasicParsing

          Write-Host "Installing Python 3.13.7..."
          Start-Process -FilePath $installer -ArgumentList "/quiet", "InstallAllUsers=1", "PrependPath=1", "Include_launcher=1" -Wait

          # Refresh PATH
          $machinePath = [System.Environment]::GetEnvironmentVariable("PATH", "Machine")
          $userPath = [System.Environment]::GetEnvironmentVariable("PATH", "User")
          $env:PATH = "$machinePath;$userPath"

          # Verify both versions are available via the legacy launcher
          py -3.14 --version
          py -3.13 --version

      - name: Build fpm
        run: cargo build --release

      - name: Add fpm to PATH
        shell: pwsh
        run: |
          $fpmDir = Join-Path $PWD "target\release"
          echo $fpmDir >> $env:GITHUB_PATH

      - name: Run unit tests
        run: cargo test

      - name: Run integration tests (including ignored)
        if: env.FPM_PYMANAGER_LIMITED != '1'
        shell: pwsh
        run: |
          # Run all tests including #[ignore] ones that need the new PyManager
          cargo test -- --ignored --nocapture

      - name: Run integration tests (limited PyManager)
        if: env.FPM_PYMANAGER_LIMITED == '1'
        shell: pwsh
        run: |
          # Only run non-ignored tests — the legacy launcher can't support
          # `py list` or `py install` that the ignored tests depend on
          Write-Host "PyManager is limited (legacy launcher) — skipping #[ignore] tests"
          cargo test

      - name: Smoke test — fpm list
        if: env.FPM_PYMANAGER_LIMITED != '1'
        shell: pwsh
        run: fpm list

      - name: Smoke test — fpm current
        shell: pwsh
        run: fpm current

      - name: Smoke test — fpm env
        shell: pwsh
        run: fpm env --shell powershell

      - name: Smoke test — fpm use
        if: env.FPM_PYMANAGER_LIMITED != '1'
        shell: pwsh
        run: |
          fpm env --shell powershell | Out-String | Invoke-Expression
          fpm use 3.13
          fpm current
          python --version

      - name: Smoke test — pass-through (legacy launcher)
        shell: pwsh
        run: |
          # py -3.14 --version works with the legacy launcher
          fpm -3.14 --version

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os-label }}
          path: |
            target/release/fpm.exe
            Cargo.lock