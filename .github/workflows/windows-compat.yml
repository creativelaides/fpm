name: Windows Compatibility

# Windows compatibility testing — runs fpm against real PyManager on
# multiple Windows versions. Separated from CI (fmt/clippy/unit tests)
# so the main CI stays fast for contributors.
#
# This workflow installs PyManager + Python on each runner, builds fpm,
# and runs the #[ignore] integration tests that require a real `py.exe`.
#
# Future contributors: copy this pattern for linux.yml or macos.yml
# when adding support for other platforms.

on:
  # Run on releases and tags (not every PR — this is heavier)
  release:
    types: [published]
  push:
    tags: ['v*']
  # Manual trigger
  workflow_dispatch:
  # Nightly sanity check
  schedule:
    - cron: '0 6 * * *'

env:
  CARGO_TERM_COLOR: always

jobs:
  compatibility:
    name: Windows ${{ matrix.os-label }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Server 2022 — shares kernel base with Windows 11
          - os: windows-latest
            os-label: 'Server 2022'
          # Server 2019 — shares kernel base with Windows 10 1809
          - os: windows-2019
            os-label: 'Server 2019'

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.96.0

      - uses: Swatinem/rust-cache@v2

      - name: Install Python via setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install PyManager (py launcher)
        shell: pwsh
        run: |
          # The py launcher is NOT included in actions/setup-python.
          # Download the standalone Windows Python launcher from python.org.
          # This installs py.exe to WindowsApps (per-user) which provides
          # `py list`, `py install`, `py -V:<tag>`, etc.
          $launcherUrl = "https://www.python.org/ftp/python/3.14.6/python-3.14.6-amd64.exe"
          $installer = "$env:TEMP\python-installer.exe"
          Write-Host "Downloading Python installer with py launcher from $launcherUrl"
          Invoke-WebRequest -Uri $launcherUrl -OutFile $installer -UseBasicParsing

          # Silent install — includes the py launcher (PREPENDPATH=1 adds to PATH)
          Start-Process -FilePath $installer -ArgumentList "/quiet", "InstallAllUsers=1", "PrependPath=1", "Include_launcher=1" -Wait

          # Refresh PATH for the current session
          $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH", "Machine") + ";" + [System.Environment]::GetEnvironmentVariable("PATH", "User")
          Write-Host "PATH: $env:PATH"

          # Verify py.exe is available
          $pyExe = Get-Command py -ErrorAction SilentlyContinue
          if (-not $pyExe) {
            # Try to find it manually
            $pyPaths = @(
              "$env:LocalAppData\Microsoft\WindowsApps\py.exe",
              "C:\Program Files\Python314\py.exe",
              "C:\Windows\py.exe"
            )
            foreach ($p in $pyPaths) {
              if (Test-Path $p) {
                Write-Host "Found py.exe at: $p"
                break
              }
            }
          }
          py --version
          py list

      - name: Install additional Python version
        shell: pwsh
        run: |
          # Install Python 3.13 via py manager
          py install 3.13
          py list

      - name: Build fpm
        run: cargo build --release

      - name: Add fpm to PATH
        shell: pwsh
        run: |
          $fpmDir = Join-Path $PWD "target\release"
          echo $fpmDir >> $env:GITHUB_PATH

      - name: Run unit tests
        run: cargo test

      - name: Run integration tests (including ignored)
        shell: pwsh
        run: |
          # Run all tests including #[ignore] ones that need real py.exe
          cargo test -- --ignored --nocapture

      - name: Smoke test — fpm list
        shell: pwsh
        run: fpm list

      - name: Smoke test — fpm current
        shell: pwsh
        run: fpm current

      - name: Smoke test — fpm env
        shell: pwsh
        run: fpm env --shell powershell

      - name: Smoke test — fpm use
        shell: pwsh
        run: |
          fpm env --shell powershell | Out-String | Invoke-Expression
          fpm use 3.13
          fpm current
          python --version

      - name: Smoke test — pass-through
        shell: pwsh
        run: fpm -0p

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os-label }}
          path: |
            target/release/fpm.exe
            Cargo.lock